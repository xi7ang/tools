name: Trigger Main Site Rebuild

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger xi7ang.github.io rebuild
        run: |
          curl -L -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/xi7ang/xi7ang.github.io/dispatches \
            -d '{"event_type":"content-updated","client_payload":{"repo":"${{ github.repository }}","ref":"${{ github.ref_name }}"}}'


