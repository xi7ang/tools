name: Notify Telegram on GitHub Push

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to channel
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          set -euo pipefail

          : "${BOT_TOKEN:?BOT_TOKEN secret is required}"
          : "${CHANNEL_ID:?TELEGRAM_CHANNEL_ID secret is required}"

          CURRENT_MONTH=$(date +'%Y%m')
          WEBSITE_URL="https://pan.devmini.space/tools/${CURRENT_MONTH}"
          TEXT=$(cat <<EOF
          📦 新增资源推送

          ${{ github.event.head_commit.message }}

          🔗 查看详情：${WEBSITE_URL}
          🌐 资料总站：https://pan.devmini.space
          EOF
          )

          RESPONSE=$(curl --fail-with-body -sS -X POST             "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"             -d chat_id="${CHANNEL_ID}"             --data-urlencode "text=${TEXT}")

          echo "$RESPONSE" | grep -q '"ok":true' || {
            echo "Telegram API returned failure: $RESPONSE"
            exit 1
          }
